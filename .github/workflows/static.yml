name: Update and Deploy Dashboard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    outputs:
      data_changed: ${{ steps.update.outputs.data_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.5

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.5

      - name: Login to SUSE Registry
        run: crane auth login registry.suse.com -u "${{ secrets.REGISTRY_USER }}" -p "${{ secrets.REGISTRY_PASSWORD }}"
        if: env.REGISTRY_USER != ''
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Restore Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            sboms/
            vulns/
            index.html
          key: ${{ runner.os }}-data-cache-
          restore-keys: |
            ${{ runner.os }}-data-cache-

      - name: Update Data and Generate Dashboard
        id: update
        run: python run_all.py
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          FORCE_REBUILD: ${{ github.event_name != 'schedule' }}

      - name: Commit changes to changelog
        if: steps.update.outputs.data_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog and data [skip ci]"
          file_pattern: 'data/*.json'
          branch: main
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Save Data Cache
        if: steps.update.outputs.data_changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            sboms/
            vulns/
            index.html
          key: ${{ runner.os }}-data-cache-${{ hashFiles('data/*.json') }}

      - name: Setup Pages
        if: steps.update.outputs.data_changed == 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.update.outputs.data_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    if: needs.build.outputs.data_changed == 'true'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
