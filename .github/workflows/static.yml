name: Update and Deploy Dashboard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.3.0

      - name: Fetch AppCo Data
        run: python fetch_suse_ai_images.py

      - name: Fetch SUSE Registry Data
        run: python fetch_suse_registry_images.py

      - name: Generate Dashboard
        run: python generate_dashboard.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
