name: Update and Deploy Dashboard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.5

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Login to SUSE Registry
        run: crane auth login registry.suse.com -u "${{ secrets.REGISTRY_USER }}" -p "${{ secrets.REGISTRY_PASSWORD }}"
        if: env.REGISTRY_USER != ''
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Restore Data Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            suse_ai_images.json
            suse_registry_images.json
            changelog.json
            sboms/
            index.html
          key: ${{ runner.os }}-data-cache-
          restore-keys: |
            ${{ runner.os }}-data-cache-

      - name: Update Data and Generate Dashboard
        id: update
        run: python run_all.py
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Commit changes to changelog
        if: steps.update.outputs.data_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog [skip ci]"
          file_pattern: 'changelog.json'
          branch: main

      - name: Save Data Cache
        if: steps.update.outputs.data_changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            suse_ai_images.json
            suse_registry_images.json
            changelog.json
            sboms/
            index.html
          key: ${{ runner.os }}-data-cache-${{ hashFiles('suse_ai_images.json', 'suse_registry_images.json', 'changelog.json') }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
